# research-wiki.config.yaml
#
# Generated by `wiki-init` from the ResearchWiki skill set's reference bundle.
# Edit by hand thereafter. ResearchWiki skills always read from this file
# (P4 — configuration over convention).
#
# This file follows the minimum schema specified in `ARCHITECTURE.md §2.4`.
# Full field specification will live in `docs/CONFIG.md` (TBD).

schema_version: 1

language:
  default: ko            # fallback when session language is ambiguous
  follow_session: true   # use the dominant language of the active session

paths:
  wiki: wiki/            # interpretation layer (human-authored, LLM-assisted)
  index: index/          # fact layer — regenerated by wiki-sync
  deep: deep/            # deep fact layer — regenerated by wiki-deepscan
  raw: raw/              # source materials (papers, experiment logs)

log_templates:
  experiment: default
  paper_reading: default
  design_decision: default
  free_form: default
  # Each may point to a custom template under templates/, e.g. `experiment: my_custom`.

deepscan:
  tool: understand-anything    # or: none. wiki-deepscan reads this.
  cadence_hint: weekly         # informational only; the tool does not auto-run.

lint:
  strict_mode: false           # if true, refuse to write pages containing [speculation] tags
